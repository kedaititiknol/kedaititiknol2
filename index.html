        trendingDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" />,
        checkCircle: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />,
        refreshCw: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.2 8H17" />,

        wallet: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />,
        tag: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />,
        store: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
      };
      return <svg className={`inline-block ${className}`} width={size} height={size} fill="none" viewBox="0 0 24 24" stroke="currentColor">{paths[name] || <circle cx="12" cy="12" r="10" strokeWidth="2" />}</svg>;
    };

    const InteractiveSvgChart = ({ data }) => {
      const maxVal = Math.max(...data.map(d => d.amount), 1000);
      const width = 500, height = 220, padding = 40;
      const chartWidth = width - padding * 2, chartHeight = height - padding * 2;
      return (
        <div className="w-full h-full flex flex-col justify-between">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full">
            {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
              const y = padding + chartHeight * (1 - ratio);
              const val = Math.round(maxVal * ratio);
              return (
                <g key={idx}>
                  <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#E1D7C6" strokeWidth="1" strokeDasharray="4 4" />
                  <text x={padding - 8} y={y + 4} textAnchor="end" className="text-[10px] font-semibold fill-coksu-400">{val >= 1000000 ? `${(val/1000000).toFixed(1)}M` : val >= 1000 ? `${Math.round(val/1000)}k` : val}</text>
                </g>
              );
            })}
            {data.map((item, idx) => {
              const barWidth = chartWidth / data.length - 24, barHeight = (item.amount / maxVal) * chartHeight;
              const x = padding + idx * (chartWidth / data.length) + 12, y = padding + chartHeight - barHeight;
              const colors = { 'Omzet': ['#C5AD8B', '#AD855B'], 'HPP': ['#60a5fa', '#2563eb'], 'Pengeluaran': ['#f87171', '#dc2626'], 'Laba Bersih': ['#34d399', '#059669'] };
              const activeColor = colors[item.name] || ['#C0A381', '#96683F'];
              return (
                <g key={idx} className="group cursor-pointer">
                  <defs><linearGradient id={`grad-${idx}`} x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stopColor={activeColor[0]} /><stop offset="100%" stopColor={activeColor[1]} /></linearGradient></defs>
                  <rect x={x} y={y} width={barWidth} height={barHeight} rx="8" fill={`url(#grad-${idx})`} className="transition-all duration-300 hover:opacity-80" />
                  <text x={x + barWidth / 2} y={y - 8} textAnchor="middle" className="text-[10px] font-bold fill-coksu-800 opacity-0 group-hover:opacity-100 transition-opacity duration-200">{formatRupiah(item.amount)}</text>
                  <text x={x + barWidth / 2} y={height - padding + 16} textAnchor="middle" className="text-[11px] font-bold fill-coksu-700">{item.name}</text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    };

    const SidebarItem = ({ icon, label, active, onClick }) => (
      <button onClick={onClick} className={`flex items-center space-x-3 w-full p-3.5 rounded-2xl transition-all duration-200 border border-transparent ${active ? 'bg-coksu-500 text-white font-bold shadow-md transform scale-[1.02]' : 'text-coksu-300 hover:bg-coksu-800 hover:text-white font-semibold'}`}>
        {icon} <span className="text-sm tracking-wide">{label}</span>
      </button>
    );

    const StatCard = ({ title, value, icon, bg }) => (
      <div className="bg-white rounded-3xl border border-krem-200 p-5 flex items-center shadow-sm hover:shadow-md transition-shadow">
        <div className={`w-12 h-12 rounded-2xl ${bg} flex items-center justify-center mr-4 shadow-sm shrink-0`}>{icon}</div>
        <div className="min-w-0">
          <p className="text-[10px] text-coksu-400 font-extrabold uppercase tracking-wider truncate">{title}</p>
          <h3 className="text-xl font-black text-coksu-800 mt-1 truncate">{value}</h3>
        </div>
      </div>
    );

    const AdminDashboard = ({ transactions, products, expenses }) => {
      const totalOmzet = transactions.reduce((sum, trx) => sum + trx.total, 0);
      const totalExpenses = expenses.reduce((sum, exp) => sum + exp.amount, 0);
      let totalHPP = 0;
      transactions.forEach(trx => trx.items.forEach(item => { const product = products.find(p => p.id === item.productId); if (product) totalHPP += (product.costPrice || 0) * item.qty; }));
      const netProfit = totalOmzet - totalHPP - totalExpenses;
      const lowStockProducts = products.filter(p => p.stock < 10);
      const recentTransactions = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

      const chartData = [
        { name: 'Omzet', amount: totalOmzet },
        { name: 'HPP', amount: totalHPP },
        { name: 'Pengeluaran', amount: totalExpenses },
        { name: 'Laba Bersih', amount: netProfit > 0 ? netProfit : 0 }
      ];

      return (
        <div className="space-y-6 pb-24 lg:pb-0 animate-fade-in-up">
          <div className="flex justify-between items-center">
            <div>
              <h1 className="text-2xl md:text-3xl font-extrabold text-coksu-900 tracking-tight">Dashboard Ringkasan</h1>
              <p className="text-xs text-coksu-500 font-medium">Performa keuangan dan statistik kedai Anda</p>
            </div>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            <StatCard title="Total Omzet" value={formatRupiah(totalOmzet)} icon={<Icon name="trendingUp" className="text-emerald-500" size={20} />} bg="bg-emerald-50" />
            <StatCard title="Total HPP" value={formatRupiah(totalHPP)} icon={<Icon name="package" className="text-blue-500" size={20} />} bg="bg-blue-50" />
            <StatCard title="Pengeluaran" value={formatRupiah(totalExpenses)} icon={<Icon name="trendingDown" className="text-red-500" size={20} />} bg="bg-red-50" />
            <StatCard title="Laba Bersih" value={formatRupiah(netProfit)} icon={<Icon name="dollarSign" className="text-amber-500" size={20} />} bg="bg-amber-50" />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white rounded-3xl p-6 shadow-sm border border-krem-200">
              <h3 className="text-lg font-bold text-coksu-800 mb-4 flex items-center"><Icon name="trendingUp" className="mr-2 text-coksu-500" /> Grafik Keuangan</h3>
              <div className="h-64">
                <InteractiveSvgChart data={chartData} />
              </div>
            </div>

            <div className="bg-white rounded-3xl p-6 shadow-sm border border-krem-200 flex flex-col justify-between">
              <div>
                <h3 className="text-lg font-bold text-coksu-800 mb-4 flex items-center justify-between">
                  <span>Stok Menipis</span>
                  <span className="text-xs bg-red-100 text-red-600 px-2.5 py-1 rounded-full font-extrabold">{lowStockProducts.length} Produk</span>
                </h3>
                <div className="space-y-3 max-h-56 overflow-y-auto custom-scrollbar pr-1">
                  {lowStockProducts.length === 0 ? (
                    <p className="text-xs text-coksu-400 italic py-4 text-center">Semua stok produk aman.</p>
                  ) : (
                    lowStockProducts.map(p => (
                      <div key={p.id} className="flex justify-between items-center p-3 bg-red-50/70 rounded-2xl border border-red-100">
                        <div>
                          <p className="font-bold text-xs text-coksu-900">{p.name}</p>
                          <p className="text-[10px] text-red-500 font-semibold mt-0.5">Sisa Stok: <span className="font-black">{p.stock}</span></p>
                        </div>
                        <span className="text-[10px] bg-red-200 text-red-800 px-2 py-0.5 rounded-lg font-bold">Pesan Lagi</span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-3xl p-6 shadow-sm border border-krem-200">
            <h3 className="text-lg font-bold text-coksu-800 mb-4 flex items-center"><Icon name="fileText" className="mr-2 text-coksu-500" /> Transaksi Terbaru</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-left text-xs">
                <thead>
                  <tr className="border-b border-krem-200 text-coksu-400 font-bold uppercase tracking-wider">
                    <th className="pb-3">ID Nota</th>
                    <th className="pb-3">Waktu</th>
                    <th className="pb-3">Kasir</th>
                    <th className="pb-3">Metode</th>
                    <th className="pb-3 text-right">Total</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-krem-100">
                  {recentTransactions.map(trx => (
                    <tr key={trx.id} className="hover:bg-krem-50 transition-colors">
                      <td className="py-3 font-bold text-coksu-900">{trx.id}</td>
                      <td className="py-3 text-coksu-600">{formatDate(trx.date)}</td>
                      <td className="py-3 text-coksu-700 font-medium">{trx.cashier}</td>
                      <td className="py-3"><span className="px-2 py-1 rounded-lg bg-krem-100 font-bold text-coksu-700 text-[10px]">{trx.paymentMethod}</span></td>
                      <td className="py-3 text-right font-black text-coksu-900">{formatRupiah(trx.total)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const POSSystem = ({ products, setProducts, categories, addTransaction, user, storeInfo }) => {
      const [cart, setCart] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');
      const [isCheckingOut, setIsCheckingOut] = useState(false);
      const [paymentAmount, setPaymentAmount] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Tunai'); 
      const [lastInvoice, setLastInvoice] = useState(null);
      const [mobileTab, setMobileTab] = useState('menu');

      const filteredProducts = products.filter(p => (selectedCategory === 'all' || p.categoryId === selectedCategory) && p.name.toLowerCase().includes(searchTerm.toLowerCase()));
      const cartTotal = cart.reduce((sum, item) => sum + (item.sellPrice * item.qty), 0);

      const addToCart = (product) => {
        if (product.stock <= 0) return;
        setCart(prev => prev.find(i => i.id === product.id) ? prev.map(i => i.id === product.id ? { ...i, qty: Math.min(i.qty + 1, product.stock) } : i) : [...prev, { ...product, qty: 1 }]);
      };

      const updateQty = (id, delta) => setCart(prev => prev.map(i => i.id === id ? { ...i, qty: Math.min(Math.max(0, i.qty + delta), i.stock) } : i).filter(i => i.qty > 0));

      const handleCheckout = (e) => {
        e.preventDefault();
        const paid = parseInt(paymentAmount) || 0;
        if (paymentMethod === 'Tunai' && paid < cartTotal) return alert("Uang tunai kurang!");

        const newTransaction = {
          id: `TRX-${Date.now().toString().slice(-6)}`, 
          date: new Date().toISOString(),
          items: cart.map(c => ({ productId: c.id, name: c.name, qty: c.qty, price: c.sellPrice, subtotal: c.sellPrice * c.qty })),
          total: cartTotal, 
          payment: paymentMethod === 'Tunai' ? paid : cartTotal, 
          change: paymentMethod === 'Tunai' ? paid - cartTotal : 0, 
          paymentMethod, 
          cashier: user.name
        };

        // Update Stok Produk

    const ReportsManager = ({ transactions, storeInfo }) => {
      const [filterDate, setFilterDate] = useState('');
      const [selectedTrx, setSelectedTrx] = useState(null);

      const filtered = transactions.filter(t => !filterDate || t.date.startsWith(filterDate));

      const exportExcel = () => {
        const data = filtered.map(t => ({
          'ID Nota': t.id,
          'Waktu': formatDate(t.date),
          'Kasir': t.cashier,
          'Metode': t.paymentMethod,
          'Total Tagihan': t.total
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Laporan Transaksi");
        XLSX.writeFile(wb, `Laporan_Transaksi_${Date.now()}.xlsx`);
      };

      const exportPDF = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`Laporan Penjualan - ${storeInfo.name}`, 14, 15);
        const rows = filtered.map(t => [t.id, formatDate(t.date), t.cashier, t.paymentMethod, formatRupiah(t.total)]);
        doc.autoTable({
          head: [['ID Nota', 'Waktu', 'Kasir', 'Metode', 'Total']],
          body: rows,
          startY: 22
        });
        doc.save(`Laporan_Penjualan_${Date.now()}.pdf`);
      };

      return (
        <div className="space-y-6 pb-24 lg:pb-0 animate-fade-in-up">

                <Icon name="download" size={16} className="mr-1.5" /> Excel
              </button>
              <button onClick={exportPDF} className="px-4 py-2.5 bg-red-600 text-white rounded-2xl text-xs font-bold shadow-sm flex items-center hover:bg-red-700">
                <Icon name="download" size={16} className="mr-1.5" /> PDF

            </div>
          </div>

          <div className="bg-white rounded-3xl p-6 shadow-sm border border-krem-200 space-y-4">

              <label className="text-xs font-bold text-coksu-700">Filter Tanggal:</label>

            <div className="overflow-x-auto">
              <table className="w-full text-left text-xs">
                <thead>
                  <tr className="border-b border-krem-200 text-coksu-400 font-bold uppercase tracking-wider">
                    <th className="pb-3">ID Nota</th>
                    <th className="pb-3">Waktu</th>
                    <th className="pb-3">Kasir</th>
                    <th className="pb-3">Metode</th>
                    <th className="pb-3 text-right">Total</th>
                    <th className="pb-3 text-right">Detail</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-krem-100">
                  {filtered.map(t => (
                    <tr key={t.id} className="hover:bg-krem-50">
                      <td className="py-3 font-bold text-coksu-900">{t.id}</td>
                      <td className="py-3 text-coksu-500">{formatDate(t.date)}</td>
                      <td className="py-3 font-medium">{t.cashier}</td>
                      <td className="py-3"><span className="bg-krem-100 px-2 py-0.5 rounded-lg text-[10px] font-bold text-coksu-700">{t.paymentMethod}</span></td>
                      <td className="py-3 text-right font-black text-coksu-900">{formatRupiah(t.total)}</td>
                      <td className="py-3 text-right">
                        <button onClick={() => setSelectedTrx(t)} className="p-1.5 bg-coksu-100 text-coksu-800 rounded-xl hover:bg-coksu-200 font-bold text-[10px]">Lihat Nota</button>

            </div>

          {/* Modal Detail Nota */}
          {selectedTrx && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm p-6">
                <div className="flex justify-between items-center mb-3">
                  <h3 className="font-bold text-sm text-coksu-900">Detail Nota {selectedTrx.id}</h3>
                  <button onClick={() => setSelectedTrx(null)}><Icon name="close" size={18} /></button>
                </div>
                <div className="space-y-2 text-xs border-t border-b border-krem-200 py-3 my-2">
                  {selectedTrx.items.map((item, i) => (
                    <div key={i} className="flex justify-between">
                      <span>{item.name} ({item.qty}x)</span>
                      <span className="font-bold">{formatRupiah(item.subtotal)}</span>
                    </div>
                  ))}
                </div>
                <div className="flex justify-between font-black text-sm mb-4">
                  <span>Total Tagihan:</span>
                  <span>{formatRupiah(selectedTrx.total)}</span>
                </div>
                <button onClick={() => window.print()} className="w-full py-3 bg-coksu-500 text-white rounded-xl font-bold flex items-center justify-center">
                  <Icon name="printer" className="mr-2" size={16} /> Cetak Nota Ini
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const SettingsSync = ({ storeInfo, setStoreInfo, appsScriptUrl, setAppsScriptUrl, handleManualSync, syncStatus }) => {
      const [formStore, setFormStore] = useState(storeInfo);
      const [scriptUrlInput, setScriptUrlInput] = useState(appsScriptUrl);

      const handleSaveStore = (e) => {
        e.preventDefault();

            <p className="text-xs text-coksu-500 font-medium">Konfigurasi identitas toko, nota kasir, dan Google Apps Script</p>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">

                </div>
                <div>
                  <label className="block text-coksu-700 font-bold mb-1">Pesan Kaki Nota (Footer)</label>
                  <input type="text" value={formStore.footerNote} onChange={e => setFormStore({...formStore, footerNote: e.target.value})} className="w-full p-3 bg-krem-50 border border-krem-200 rounded-xl font-bold" />
                </div>
                <button type="submit" className="w-full py-3 bg-coksu-500 text-white rounded-xl font-bold shadow-md hover:bg-coksu-600 transition-colors">Simpan Identitas</button>
              </form>
            </div>

            <div className="bg-white rounded-3xl p-6 shadow-sm border border-krem-200 flex flex-col justify-between space-y-4">
              <div>
                <h3 className="font-bold text-sm text-coksu-900 mb-4 flex items-center"><Icon name="refreshCw" className="mr-2 text-coksu-500" /> Webhook Google Apps Script</h3>
                <div className="space-y-3 text-xs">
                  <div>
                    <label className="block text-coksu-700 font-bold mb-1">Apps Script Web App URL</label>
                    <input type="url" value={scriptUrlInput} onChange={e => setScriptUrlInput(e.target.value)} className="w-full p-3 bg-krem-50 border border-krem-200 rounded-xl font-mono text-[10px]" />
                  </div>
                  <div className="p-3 bg-amber-50 border border-amber-200 rounded-2xl text-[11px] text-amber-800 space-y-1">
                    <p className="font-bold">Informasi Integrasi Cloud:</p>
                    <p>URL di atas digunakan untuk mengirim laporan transaksi secara langsung ke Google Sheets secara otomatis atau manual.</p>
                  </div>
                </div>
              </div>

              <div className="pt-4 border-t border-krem-100">
                <button onClick={handleManualSync} className="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-md hover:bg-emerald-700 transition-colors flex items-center justify-center">
                  <Icon name="refreshCw" size={18} className="mr-2" /> Sinkronkan Data Sekarang
                </button>
                {syncStatus && <p className="text-center text-[10px] font-bold text-coksu-500 mt-2">{syncStatus}</p>}
              </div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('titiknol_user')));
      const [adminPassword] = useState('admin123'); 
      const [kasirPassword] = useState('kasir123');

      const [categories, setCategories] = useState(() => JSON.parse(localStorage.getItem('titiknol_categories')) || initialCategories);
      const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('titiknol_products')) || initialProducts);
      const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('titiknol_transactions')) || initialTransactions);
      const [expenses, setExpenses] = useState(() => JSON.parse(localStorage.getItem('titiknol_expenses')) || initialExpenses);
      const [storeInfo, setStoreInfo] = useState(() => JSON.parse(localStorage.getItem('titiknol_store_info')) || defaultStoreInfo);
      const [appsScriptUrl, setAppsScriptUrl] = useState(() => localStorage.getItem('titiknol_script_url') || DEFAULT_APPS_SCRIPT_URL);

      const [loginForm, setLoginForm] = useState({ username: '', password: '', customCashierName: '' });
      const [loginError, setLoginError] = useState('');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);

      // PWA & Sync States
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [pwaPrompt, setPwaPrompt] = useState(null);
      const [updateAvailable, setUpdateAvailable] = useState(false);
      const [syncStatus, setSyncStatus] = useState('');
      const [isSyncing, setIsSyncing] = useState(false);

      // Persistence Effects
      useEffect(() => { localStorage.setItem('titiknol_categories', JSON.stringify(categories)); }, [categories]);
      useEffect(() => { localStorage.setItem('titiknol_products', JSON.stringify(products)); }, [products]);
      useEffect(() => { localStorage.setItem('titiknol_transactions', JSON.stringify(transactions)); }, [transactions]);
      useEffect(() => { localStorage.setItem('titiknol_expenses', JSON.stringify(expenses)); }, [expenses]);
      useEffect(() => { localStorage.setItem('titiknol_store_info', JSON.stringify(storeInfo)); }, [storeInfo]);
      useEffect(() => { localStorage.setItem('titiknol_script_url', appsScriptUrl); }, [appsScriptUrl]);

      // Manual Sync Function
      const handleManualSync = async () => {
        setIsSyncing(true);
        setSyncStatus('Menghubungkan ke Google Apps Script...');
        try {
          const queue = JSON.parse(localStorage.getItem('titiknol_sync_queue') || '[]');
          const payload = queue.length > 0 ? queue : transactions.slice(0, 5);

          await Promise.all(payload.map(trx => 
            fetch(appsScriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(trx) })
          ));

          localStorage.removeItem('titiknol_sync_queue');
          setSyncStatus('Sinkronisasi Berhasil Dikirim!');
        } catch (err) {
          setSyncStatus('Gagal sinkronisasi. Cek koneksi internet.');
        } finally {
          setIsSyncing(false);
          setTimeout(() => setSyncStatus(''), 4000);
        }
      };

      // Online/Offline & PWA Install Listener
      useEffect(() => {
        const handleOnline = () => {
          setIsOnline(true);
          const queue = JSON.parse(localStorage.getItem('titiknol_sync_queue') || '[]');
          if (queue.length > 0) handleManualSync();
        };
        const handleOffline = () => setIsOnline(false);

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setPwaPrompt(e); });
        window.addEventListener('pwa-update-available', () => setUpdateAvailable(true));

        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, [appsScriptUrl, transactions]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginForm.username === 'admin' && loginForm.password === adminPassword) {
          const u = { role: 'admin', name: 'Super Admin' };
          setUser(u); localStorage.setItem('titiknol_user', JSON.stringify(u));
          setActiveTab('dashboard');
        } else if (loginForm.username === 'kasir' && loginForm.password === kasirPassword) {
          const u = { role: 'kasir', name: loginForm.customCashierName || 'Kasir Kedai' };
          setUser(u); localStorage.setItem('titiknol_user', JSON.stringify(u));
          setActiveTab('pos');
        } else {
          setLoginError('Username atau Password salah!');
        }
      };

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-coksu-900">
            <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
              <div className="text-center mb-6">
                <h2 className="text-2xl font-black text-coksu-900 tracking-tight">KEDAI TITIK NOL</h2>
                <p className="text-xs text-coksu-500 font-bold mt-1">Sistem POS & Management Kasir</p>
              </div>
              {loginError && <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-xl text-xs font-bold text-center">{loginError}</div>}
              <form onSubmit={handleLogin} className="space-y-4 text-xs">
                <div>
                  <label className="block text-coksu-700 font-bold mb-1">Username</label>
                  <input required placeholder="admin / kasir" className="w-full px-4 py-3 rounded-xl border border-krem-200 outline-none focus:ring-2 focus:ring-coksu-400 font-bold" value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} />
                </div>
                <div>
                  <label className="block text-coksu-700 font-bold mb-1">Password</label>
                  <input required type="password" placeholder="••••••••" className="w-full px-4 py-3 rounded-xl border border-krem-200 outline-none focus:ring-2 focus:ring-coksu-400 font-bold" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} />
                </div>
                {loginForm.username === 'kasir' && (
                  <div>
                    <label className="block text-coksu-700 font-bold mb-1">Nama Kasir Bertugas</label>
                    <input required placeholder="Nama Anda" className="w-full px-4 py-3 rounded-xl border border-krem-200 outline-none font-bold" value={loginForm.customCashierName} onChange={e => setLoginForm({...loginForm, customCashierName: e.target.value})} />
                  </div>
                )}
                <button type="submit" className="w-full py-3.5 bg-coksu-500 text-white rounded-xl font-bold shadow-md hover:bg-coksu-600 transition-colors mt-2 text-sm">Masuk ke Aplikasi</button>
              </form>
            </div>
          </div>
        );
      }

      const SidebarContent = () => (
        <>
          <div className="p-6 shrink-0">
            <h2 className="text-2xl font-black text-coksu-50 tracking-tight">TITIK NOL</h2>
            <p className="text-coksu-300 text-[10px] font-bold mt-1 uppercase tracking-widest">Sistem Kasir POS</p>
          </div>
          <div className="flex-1 px-4 space-y-2 overflow-y-auto custom-scrollbar">
            {user.role === 'admin' && <SidebarItem icon={<Icon name="dashboard"/>} label="Dashboard" active={activeTab==='dashboard'} onClick={()=>{setActiveTab('dashboard'); setIsSidebarOpen(false);}} />}
            <SidebarItem icon={<Icon name="cart"/>} label="Kasir (POS)" active={activeTab==='pos'} onClick={()=>{setActiveTab('pos'); setIsSidebarOpen(false);}} />
            {user.role === 'admin' && (
              <>
                <SidebarItem icon={<Icon name="package"/>} label="Kelola Menu" active={activeTab==='products'} onClick={()=>{setActiveTab('products'); setIsSidebarOpen(false);}} />
                <SidebarItem icon={<Icon name="wallet"/>} label="Pengeluaran" active={activeTab==='expenses'} onClick={()=>{setActiveTab('expenses'); setIsSidebarOpen(false);}} />
                <SidebarItem icon={<Icon name="fileText"/>} label="Riwayat & Laporan" active={activeTab==='reports'} onClick={()=>{setActiveTab('reports'); setIsSidebarOpen(false);}} />
                <SidebarItem icon={<Icon name="settings"/>} label="Pengaturan & Sync" active={activeTab==='settings'} onClick={()=>{setActiveTab('settings'); setIsSidebarOpen(false);}} />
              </>
            )}
          </div>
          <div className="p-4 border-t border-coksu-800 shrink-0">
            <div className="mb-3 px-2 flex justify-between items-center text-xs">
              <span className="text-coksu-300 font-medium truncate">{user.name}</span>
              <span className="text-[10px] bg-coksu-700 px-2 py-0.5 rounded-md font-bold uppercase">{user.role}</span>
            </div>
            <button onClick={()=>{setUser(null); localStorage.removeItem('titiknol_user');}} className="w-full py-2.5 bg-red-500/10 text-red-400 font-bold text-xs rounded-xl flex items-center justify-center hover:bg-red-500/20">
              <Icon name="logout" className="mr-2" size={16}/> Keluar
            </button>
          </div>
        </>
      );

      return (
        <div className="flex h-screen w-full bg-krem-50 overflow-hidden">
          {/* Desktop Sidebar */}
          <div className="hidden lg:flex w-64 bg-coksu-900 text-white flex-col shrink-0">{SidebarContent()}</div>
          
          {/* Mobile Sidebar Overlay */}
          {isSidebarOpen && (
            <div className="lg:hidden fixed inset-0 z-50 flex">
              <div className="w-64 bg-coksu-900 text-white flex flex-col shadow-2xl animate-fade-in">{SidebarContent()}</div>
              <div className="flex-1 bg-black/50" onClick={() => setIsSidebarOpen(false)}></div>
            </div>
          )}

          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            {/* Update PWA Banner */}
            {updateAvailable && (
              <div className="bg-coksu-500 text-white px-4 py-2.5 text-xs font-bold flex justify-between items-center shrink-0">
                <span className="flex items-center"><Icon name="refreshCw" size={14} className="mr-2 animate-spin-slow" /> Versi PWA baru tersedia!</span>
                <button onClick={() => window.location.reload(true)} className="bg-white text-coksu-700 px-3 py-1 rounded-lg shadow-sm">Muat Ulang</button>
              </div>
            )}

            {/* Topbar Header */}
            <header className="bg-white h-16 border-b border-krem-200 flex items-center justify-between px-4 lg:px-6 shrink-0 z-10">
              <div className="flex items-center">
                <button className="lg:hidden p-2 -ml-2 text-coksu-900 mr-2" onClick={() => setIsSidebarOpen(true)}><Icon name="menu" size={24}/></button>
                <h1 className="lg:hidden font-black text-coksu-900 text-base">{storeInfo.name}</h1>
              </div>
              
              <div className="flex items-center space-x-2.5">
                {/* Manual Sync Button in Topbar */}
                <button onClick={handleManualSync} disabled={isSyncing} className="flex items-center px-3 py-1.5 bg-coksu-50 border border-coksu-200 text-coksu-800 rounded-xl text-xs font-bold hover:bg-coksu-100 transition-colors">
                  <Icon name="refreshCw" size={14} className={`mr-1.5 text-coksu-600 ${isSyncing ? 'animate-spin-slow' : ''}`} />
                  <span>{isSyncing ? 'Syncing...' : 'Sinkronkan'}</span>
                </button>

                {/* PWA Install Button */}
                {pwaPrompt && (
                  <button onClick={() => pwaPrompt.prompt()} className="flex items-center px-3 py-1.5 bg-emerald-600 text-white rounded-xl text-xs font-bold shadow-sm hover:bg-emerald-700">
                    <Icon name="download" size={14} className="mr-1.5" /> Install App
                  </button>
                )}

                {/* Network Status Badge */}
                <div className={`flex items-center px-3 py-1.5 rounded-xl text-[10px] font-extrabold uppercase tracking-widest ${isOnline ? 'bg-emerald-50 text-emerald-700 border border-emerald-100' : 'bg-red-50 text-red-600 border border-red-100'}`}>
                  <span className={`w-2 h-2 rounded-full mr-1.5 ${isOnline ? 'bg-emerald-500 animate-pulse' : 'bg-red-500'}`}></span> {isOnline ? 'Online' : 'Offline'}
                </div>
              </div>
            </header>

            {/* Main Content Area */}
            <main className="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 bg-krem-50">
              {activeTab === 'dashboard' && <AdminDashboard transactions={transactions} products={products} expenses={expenses} />}
              {activeTab === 'pos' && <POSSystem products={products} setProducts={setProducts} categories={categories} addTransaction={(t) => setTransactions([t, ...transactions])} user={user} storeInfo={storeInfo} />}
              {activeTab === 'products' && <ProductsManager products={products} setProducts={setProducts} categories={categories} setCategories={setCategories} />}
              {activeTab === 'expenses' && <ExpensesManager expenses={expenses} setExpenses={setExpenses} />}
              {activeTab === 'reports' && <ReportsManager transactions={transactions} storeInfo={storeInfo} />}
              {activeTab === 'settings' && <SettingsSync storeInfo={storeInfo} setStoreInfo={setStoreInfo} appsScriptUrl={appsScriptUrl} setAppsScriptUrl={setAppsScriptUrl} handleManualSync={handleManualSync} syncStatus={syncStatus} />}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator && (window.location.protocol === 'http:' || window.location.protocol === 'https:')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(registration => {
            console.log('ServiceWorker terdaftar:', registration.scope);
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  window.dispatchEvent(new CustomEvent('pwa-update-available'));
                }
              };
            };
          })
          .catch(err => console.warn('ServiceWorker gagal/dilewati:', err));
      });
    }
  </script>
</body>
</html>
